name: Publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Read/write .NET 8 Minimal API wrapping the Eigenfocus SQLite database.

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assemble deployment bundle
        run: |
          set -euo pipefail
          mkdir -p release
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository }}:${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')

          cat > release/compose.yml <<EOF
          services:
            eigenfocus-api:
              image: ${IMAGE_LOWER}
              container_name: eigenfocus-api
              restart: unless-stopped
              ports:
                - "8080:8080"
              environment:
                - ApiKey=\${API_KEY:?set API_KEY in .env}
                - ConnectionStrings__DefaultConnection=\${CONNECTION_STRING:-Data Source=/data/production.sqlite3;Mode=ReadWrite;Cache=Shared;Journal Mode=WAL}
              volumes:
                - ./data:/data
          EOF

          cat > release/.env.example <<'EOF'
          # Copy this file to `.env` next to compose.yml and fill in values.
          API_KEY=replace-me

          # Optional — defaults to /data/production.sqlite3 in WAL mode.
          # CONNECTION_STRING=Data Source=/data/production.sqlite3;Mode=ReadWrite;Cache=Shared;Journal Mode=WAL
          EOF

          (cd release && zip -r "../eigenfocus-api-${{ github.ref_name }}-docker.zip" compose.yml .env.example)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            eigenfocus-api-${{ github.ref_name }}-docker.zip
            release/compose.yml
            release/.env.example
